name: Docker Publish
on:
  push:
    branches: ["master", "main"]
permissions:
  contents: read
  packages: write
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prep Image Name
        id: prep
        run: echo "owner_lc=${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
#          tags: ghcr.io/${{ github.repository }}/app:latest
#          tags: ghcr.io/${{ github.repository_owner }}/app:latest
#          tags: ghcr.io/${{ github.repository_owner.toLowerCase() }}/app:latest
          tags: ghcr.io/${{ env.owner_lc }}/app:latest
